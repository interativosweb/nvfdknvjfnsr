<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoLab - Gerenciar Perguntas</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #58CC02;
            --green-dark: #46A302;
            --green-shadow: #3D8A00;
            --blue: #1CB0F6;
            --blue-dark: #0F8EC4;
            --red: #FF4B4B;
            --red-dark: #EA2B2B;
            --red-shadow: #C41E1E;
            --orange: #FF9600;
            --purple: #CE82FF;
            --yellow: #FFC800;
            --white: #FFFFFF;
            --off-white: #F7F7F7;
            --light-gray: #E5E5E5;
            --medium-gray: #AFAFAF;
            --dark-gray: #777777;
            --text: #3C3C3C;
            --border-radius: 16px;
            --border-radius-lg: 24px;
            --font: 'Nunito', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--off-white);
            color: var(--text);
            min-height: 100vh;
            padding: 28px 20px 100px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .titulo-container { display: flex; flex-direction: column; gap: 4px; }

        .btn-voltar {
            text-decoration: none;
            color: var(--green);
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.82rem;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: opacity 0.2s;
        }
        .btn-voltar:hover { opacity: 0.7; }

        .titulo-pagina {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: -0.5px;
        }
        .titulo-pagina span { color: var(--green); }

        .subtitle {
            font-size: 0.78rem;
            color: var(--medium-gray);
            font-weight: 700;
        }

        /* Question cards */
        .question-card {
            background: var(--white);
            border: 2px solid var(--light-gray);
            border-radius: var(--border-radius);
            box-shadow: 0 3px 0 var(--light-gray);
            padding: 20px;
            margin-bottom: 14px;
            position: relative;
            transition: border-color 0.2s;
        }
        .question-card:hover { border-color: var(--green); }

        .question-card .q-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .q-number {
            background: var(--green);
            color: white;
            font-weight: 900;
            font-size: 0.78rem;
            min-width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 0 var(--green-shadow);
        }

        .q-type-badge {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 10px;
            border-radius: 50px;
            border: 2px solid;
        }
        .q-type-badge.text { color: var(--blue-dark); border-color: var(--blue); background: #E5F5FE; }
        .q-type-badge.choice { color: var(--purple-dark, #9C3FA6); border-color: var(--purple); background: #F5E5FF; }

        .q-actions {
            margin-left: auto;
            display: flex;
            gap: 6px;
        }

        .btn-icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            border: 2px solid var(--light-gray);
            background: var(--off-white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all 0.15s;
            box-shadow: 0 2px 0 var(--light-gray);
        }
        .btn-icon:hover { border-color: var(--green); }
        .btn-icon.delete:hover { border-color: var(--red); background: #FDE8E8; }

        .q-text-input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--light-gray);
            border-radius: 12px;
            font-family: var(--font);
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text);
            outline: none;
            resize: vertical;
            min-height: 48px;
            transition: border-color 0.2s;
        }
        .q-text-input:focus { border-color: var(--green); }

        .q-label {
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--medium-gray);
            margin-bottom: 6px;
            margin-top: 12px;
        }

        /* Options for choice questions */
        .options-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }

        .option-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .option-letter {
            min-width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--off-white);
            border: 2px solid var(--light-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.78rem;
            color: var(--dark-gray);
        }
        .option-letter.correct {
            background: #E8F9D9;
            border-color: var(--green);
            color: var(--green-dark);
        }

        .option-input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid var(--light-gray);
            border-radius: 10px;
            font-family: var(--font);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }
        .option-input:focus { border-color: var(--green); }

        .btn-correct {
            padding: 6px 10px;
            border-radius: 8px;
            border: 2px solid var(--light-gray);
            background: var(--off-white);
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--dark-gray);
            transition: all 0.15s;
        }
        .btn-correct:hover { border-color: var(--green); }
        .btn-correct.active {
            background: #E8F9D9;
            border-color: var(--green);
            color: var(--green-dark);
        }

        .btn-remove-option {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--medium-gray);
            font-size: 1rem;
            transition: color 0.15s;
        }
        .btn-remove-option:hover { color: var(--red); }

        /* Type selector */
        .type-selector {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .type-btn {
            padding: 8px 16px;
            border-radius: 10px;
            border: 2px solid var(--light-gray);
            background: var(--white);
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.82rem;
            font-weight: 800;
            color: var(--dark-gray);
            box-shadow: 0 2px 0 var(--light-gray);
            transition: all 0.15s;
        }
        .type-btn:hover { border-color: var(--green); }
        .type-btn.active {
            background: #E8F9D9;
            border-color: var(--green);
            color: var(--green-dark);
            box-shadow: 0 2px 0 var(--green-shadow);
        }

        /* Bottom actions */
        .bottom-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .btn-add {
            background: var(--green);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-family: var(--font);
            font-size: 0.9rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--green-shadow);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-add:hover { background: var(--green-dark); }
        .btn-add:active { box-shadow: 0 0 0; transform: translateY(4px); }

        .btn-save {
            background: var(--blue);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-family: var(--font);
            font-size: 0.9rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--blue-shadow, #0A6FA0);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-save:hover { background: var(--blue-dark); }
        .btn-save:active { box-shadow: 0 0 0; transform: translateY(4px); }

        .btn-add-option {
            background: none;
            border: 2px dashed var(--light-gray);
            border-radius: 10px;
            padding: 8px 14px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.78rem;
            font-weight: 800;
            color: var(--medium-gray);
            transition: all 0.15s;
            margin-top: 6px;
        }
        .btn-add-option:hover { border-color: var(--green); color: var(--green-dark); }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: var(--green);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 0 var(--green-shadow);
            font-size: 0.82rem;
            font-weight: 800;
            animation: slideIn 0.4s ease;
        }
        .toast.error { background: var(--red); box-shadow: 0 4px 0 var(--red-shadow); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--medium-gray);
            font-weight: 700;
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

        /* Drag handle */
        .drag-handle {
            cursor: grab;
            color: var(--medium-gray);
            font-size: 1.1rem;
            user-select: none;
        }
        .drag-handle:active { cursor: grabbing; }

        /* Move buttons */
        .btn-move {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 2px solid var(--light-gray);
            background: var(--off-white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            transition: all 0.15s;
        }
        .btn-move:hover { border-color: var(--green); }

        .info-box {
            background: #E5F5FE;
            border: 2px solid var(--blue);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 20px;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--blue-dark);
            line-height: 1.5;
        }

        /* Animation selector */
        .anim-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            padding: 10px 14px;
            background: #FFF8E1;
            border: 2px solid var(--yellow);
            border-radius: 12px;
        }
        .anim-row .anim-icon {
            font-size: 1.2rem;
        }
        .anim-row .anim-label {
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--orange);
            white-space: nowrap;
        }
        .anim-select {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid var(--light-gray);
            border-radius: 10px;
            font-family: var(--font);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text);
            outline: none;
            background: var(--white);
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .anim-select:focus { border-color: var(--orange); }
        .anim-preview-btn {
            padding: 6px 12px;
            border-radius: 8px;
            border: 2px solid var(--orange);
            background: var(--white);
            color: var(--orange);
            font-family: var(--font);
            font-size: 0.75rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .anim-preview-btn:hover { background: #FFF3E0; }
        .anim-preview-btn:disabled { opacity: 0.3; cursor: default; }

        @media (max-width: 600px) {
            .option-row { flex-wrap: wrap; }
            .q-actions { flex-wrap: wrap; }
            .anim-row { flex-wrap: wrap; }
        }
    </style>
</head>

<body>
    <div id="toastContainer" class="toast-container"></div>

    <div class="container">
        <header>
            <div class="titulo-container">
                <a href="classificacao.html" class="btn-voltar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M15 18l-6-6 6-6" />
                    </svg>
                    Voltar para Classificação
                </a>
                <h1 class="titulo-pagina">Gerenciar Perguntas — Geo<span>Lab</span></h1>
                <p class="subtitle">Adicione, edite ou remova as perguntas da atividade</p>
            </div>
        </header>

        <div class="info-box">
            As atividades práticas (criar figuras com translação, rotação e simetria) não são editáveis aqui. Apenas as perguntas dissertativas e de múltipla escolha podem ser gerenciadas.
        </div>

        <div id="questionsList"></div>

        <div class="bottom-actions">
            <button class="btn-add" onclick="addQuestion('text')">+ Dissertativa</button>
            <button class="btn-add" style="background:var(--purple);box-shadow:0 4px 0 #9C3FA6;" onclick="addQuestion('choice')">+ Múltipla Escolha</button>
            <button class="btn-save" onclick="saveAllQuestions()">Salvar Alterações</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKEQC9tEOEtEL6rmueYmHD20P7Gz3zjGs",
            authDomain: "geolab-2cd42.firebaseapp.com",
            databaseURL: "https://geolab-2cd42-default-rtdb.firebaseio.com",
            projectId: "geolab-2cd42",
            storageBucket: "geolab-2cd42.firebasestorage.app",
            messagingSenderId: "22712172336",
            appId: "1:22712172336:web:1c4951be9e677d0de252f5",
            measurementId: "G-KX6H436G88"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Default questions (same as the original hardcoded ones)
        const defaultQuestions = [
            { question: "O que é uma transformação geométrica?", type: "text" },
            { question: "O que é uma translação?", type: "text" },
            { question: "O que é uma simetria?", type: "text" },
            {
                question: "A figura ao lado foi obtida por meio de dois movimentos. Quais foram esses movimentos?",
                type: "choice",
                options: ["Translação e rotação", "Reflexão e rotação", "Translação e reflexão", "Rotação e ampliação"],
                correct: 1,
                animacao: 1
            },
            {
                question: "Se girarmos um quadrado em torno de um ponto, qual transformação geométrica está ocorrendo?",
                type: "choice",
                options: ["Rotação", "Giro", "Translação", "Simetria"],
                correct: 0
            },
            {
                question: "Quando uma figura apenas muda de lugar, sem girar ou mudar de tamanho, qual transformação ocorreu?",
                type: "choice",
                options: ["Translação", "Rotação", "Simetria", "Ampliação"],
                correct: 0
            },
            {
                question: "Quando uma figura é refletida como se estivesse em um espelho, qual transformação geométrica acontece?",
                type: "choice",
                options: ["Translação", "Simetria", "Rotação", "Redução"],
                correct: 1
            }
        ];

        let questions = [];

        // Load questions from Firebase
        async function loadQuestions() {
            try {
                const snap = await get(ref(db, 'geolab_perguntas'));
                if (snap.exists()) {
                    questions = snap.val();
                    // Ensure it's an array
                    if (!Array.isArray(questions)) questions = Object.values(questions);
                } else {
                    // Initialize with defaults
                    questions = JSON.parse(JSON.stringify(defaultQuestions));
                    await set(ref(db, 'geolab_perguntas'), questions);
                }
            } catch (e) {
                console.warn('Error loading questions:', e);
                questions = JSON.parse(JSON.stringify(defaultQuestions));
            }
            renderQuestions();
        }

        function renderQuestions() {
            const container = document.getElementById('questionsList');
            if (questions.length === 0) {
                container.innerHTML = '<div class="empty-state"><div>Nenhuma pergunta cadastrada.<br>Clique nos botoes abaixo para adicionar.</div></div>';
                return;
            }

            container.innerHTML = '';
            questions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.dataset.index = idx;

                const isChoice = q.type === 'choice';
                const letters = ['A', 'B', 'C', 'D', 'E', 'F'];

                let optionsHTML = '';
                if (isChoice) {
                    const opts = q.options || ['', '', '', ''];
                    optionsHTML = `
                        <div class="q-label">Opções</div>
                        <div class="options-list" id="optionsList${idx}">
                            ${opts.map((opt, oi) => `
                                <div class="option-row">
                                    <span class="option-letter ${q.correct === oi ? 'correct' : ''}">${letters[oi]}</span>
                                    <input type="text" class="option-input" value="${escapeHTML(opt)}" placeholder="Opção ${letters[oi]}..." data-q="${idx}" data-o="${oi}" onchange="updateOption(${idx}, ${oi}, this.value)">
                                    <button class="btn-correct ${q.correct === oi ? 'active' : ''}" onclick="setCorrect(${idx}, ${oi})" title="Marcar como correta">&#10003;</button>
                                    ${opts.length > 2 ? `<button class="btn-remove-option" onclick="removeOption(${idx}, ${oi})" title="Remover">&times;</button>` : ''}
                                </div>
                            `).join('')}
                        </div>
                        ${opts.length < 6 ? `<button class="btn-add-option" onclick="addOption(${idx})">+ Adicionar Opção</button>` : ''}
                    `;
                }

                const animVal = q.animacao || 0;
                const animHTML = `
                    <div class="anim-row">
                        <span class="anim-icon" style="font-size:0.85rem;color:var(--orange);font-weight:900;">&#9654;</span>
                        <span class="anim-label">Animação</span>
                        <select class="anim-select" onchange="updateAnimacao(${idx}, this.value)">
                            <option value="0" ${animVal == 0 ? 'selected' : ''}>Nenhuma</option>
                            <option value="1" ${animVal == 1 ? 'selected' : ''}>01 — Rotação e Reflexão</option>
                            <option value="2" ${animVal == 2 ? 'selected' : ''}>02 — (em breve)</option>
                            <option value="3" ${animVal == 3 ? 'selected' : ''}>03 — (em breve)</option>
                            <option value="4" ${animVal == 4 ? 'selected' : ''}>04 — (em breve)</option>
                            <option value="5" ${animVal == 5 ? 'selected' : ''}>05 — (em breve)</option>
                            <option value="6" ${animVal == 6 ? 'selected' : ''}>06 — (em breve)</option>
                        </select>
                        <button class="anim-preview-btn" onclick="previewAnimacao(${idx})" ${animVal == 0 ? 'disabled' : ''}>Visualizar</button>
                    </div>
                `;

                card.innerHTML = `
                    <div class="q-header">
                        <div class="q-number">${idx + 1}</div>
                        <span class="q-type-badge ${q.type}">${isChoice ? 'Múltipla Escolha' : 'Dissertativa'}</span>
                        <div class="q-actions">
                            <button class="btn-move" onclick="moveQuestion(${idx}, -1)" title="Mover para cima" ${idx === 0 ? 'disabled style="opacity:0.3"' : ''}>&#9650;</button>
                            <button class="btn-move" onclick="moveQuestion(${idx}, 1)" title="Mover para baixo" ${idx === questions.length - 1 ? 'disabled style="opacity:0.3"' : ''}>&#9660;</button>
                            <button class="btn-icon delete" onclick="deleteQuestion(${idx})" title="Excluir pergunta">&times;</button>
                        </div>
                    </div>
                    <div class="q-label">Pergunta</div>
                    <textarea class="q-text-input" rows="2" placeholder="Digite a pergunta..." onchange="updateQuestionText(${idx}, this.value)">${escapeHTML(q.question || '')}</textarea>
                    ${optionsHTML}
                    ${animHTML}
                `;

                container.appendChild(card);
            });
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Global functions
        window.addQuestion = (type) => {
            const q = { question: '', type: type };
            if (type === 'choice') {
                q.options = ['', '', '', ''];
                q.correct = 0;
            }
            questions.push(q);
            renderQuestions();
            // Scroll to new card
            setTimeout(() => {
                const cards = document.querySelectorAll('.question-card');
                if (cards.length) cards[cards.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        };

        window.deleteQuestion = (idx) => {
            if (!confirm(`Deseja excluir a pergunta ${idx + 1}?`)) return;
            questions.splice(idx, 1);
            renderQuestions();
        };

        window.updateQuestionText = (idx, text) => {
            questions[idx].question = text;
        };

        window.updateOption = (idx, optIdx, text) => {
            if (!questions[idx].options) questions[idx].options = [];
            questions[idx].options[optIdx] = text;
        };

        window.setCorrect = (idx, optIdx) => {
            questions[idx].correct = optIdx;
            renderQuestions();
        };

        window.addOption = (idx) => {
            if (!questions[idx].options) questions[idx].options = [];
            if (questions[idx].options.length < 6) {
                questions[idx].options.push('');
                renderQuestions();
            }
        };

        window.removeOption = (idx, optIdx) => {
            if (questions[idx].options.length <= 2) return;
            questions[idx].options.splice(optIdx, 1);
            if (questions[idx].correct >= questions[idx].options.length) {
                questions[idx].correct = questions[idx].options.length - 1;
            }
            renderQuestions();
        };

        window.updateAnimacao = (idx, val) => {
            const num = parseInt(val) || 0;
            if (num > 0) {
                questions[idx].animacao = num;
            } else {
                delete questions[idx].animacao;
            }
            // Atualiza o botão Visualizar
            const card = document.querySelectorAll('.question-card')[idx];
            if (card) {
                const btn = card.querySelector('.anim-preview-btn');
                if (btn) btn.disabled = (num === 0);
            }
        };

        window.previewAnimacao = (idx) => {
            const anim = questions[idx].animacao;
            if (anim && anim > 0) {
                window.open('animacoes.html?anim=' + anim, '_blank', 'width=600,height=450');
            }
        };

        window.moveQuestion = (idx, dir) => {
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= questions.length) return;
            [questions[idx], questions[newIdx]] = [questions[newIdx], questions[idx]];
            renderQuestions();
        };

        window.saveAllQuestions = async () => {
            // Validate
            for (let i = 0; i < questions.length; i++) {
                const q = questions[i];
                if (!q.question || !q.question.trim()) {
                    showToast(`Pergunta ${i + 1} está sem texto!`, 'error');
                    return;
                }
                if (q.type === 'choice') {
                    if (!q.options || q.options.length < 2) {
                        showToast(`Pergunta ${i + 1} precisa de pelo menos 2 opções!`, 'error');
                        return;
                    }
                    for (let j = 0; j < q.options.length; j++) {
                        if (!q.options[j] || !q.options[j].trim()) {
                            showToast(`Pergunta ${i + 1}, opção ${j + 1} está vazia!`, 'error');
                            return;
                        }
                    }
                }
            }

            try {
                await set(ref(db, 'geolab_perguntas'), questions);
                showToast('Perguntas salvas com sucesso!');
            } catch (e) {
                console.error('Save error:', e);
                showToast('Erro ao salvar: ' + e.message, 'error');
            }
        };

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast' + (type === 'error' ? ' error' : '');
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
        }

        // Init
        loadQuestions();
    </script>
</body>

</html>
