<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoLab - Animacoes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas { display: block; }
  .msg-erro {
    font-family: 'Nunito', Arial, sans-serif;
    color: #999;
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    padding: 40px;
  }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = document.documentElement.clientWidth || window.innerWidth || 500;
  canvas.height = document.documentElement.clientHeight || window.innerHeight || 400;
}
resize();
window.addEventListener('resize', resize);
setTimeout(resize, 100);
setTimeout(resize, 500);

// ========== UTILITARIOS COMUNS ==========
function rotPt(x, y, ang) {
  const r = ang * Math.PI / 180;
  return [x*Math.cos(r) - y*Math.sin(r), x*Math.sin(r) + y*Math.cos(r)];
}
function reflectY(x, y) { return [x, -y]; }
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpPts(a, b, t) { return a.map((p,i) => [lerp(p[0],b[i][0],t), lerp(p[1],b[i][1],t)]); }
function darken(hex) {
  if (hex.length === 4) hex = '#' + hex[1]+hex[1] + hex[2]+hex[2] + hex[3]+hex[3];
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${~~(r*0.65)},${~~(g*0.65)},${~~(b*0.65)})`;
}
function easeInOut(t) { return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }

function drawPoly(pts, fill, stroke, alpha) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

// Desenha vertices de um poligono
function drawVertices(pts, color, alpha, radius) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  pts.forEach(([x, y]) => {
    ctx.beginPath();
    ctx.arc(x, y, radius || 3.5, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// Desenha ponto de rotacao (mais destacado)
function drawRotationPoint(x, y, alpha) {
  ctx.globalAlpha = alpha;
  // Circulo externo
  ctx.strokeStyle = '#E53935';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, 7, 0, Math.PI * 2);
  ctx.stroke();
  // Circulo interno preenchido
  ctx.fillStyle = '#E53935';
  ctx.beginPath();
  ctx.arc(x, y, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawLabel(x, y, text, alpha, size) {
  ctx.globalAlpha = alpha;
  ctx.font = 'bold ' + (size || 16) + 'px "Nunito", Arial, sans-serif';
  ctx.fillStyle = '#333';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
  ctx.globalAlpha = 1;
}

function drawShapeXFlip(cx, cy, scale, pieces, alpha, flipT) {
  // flipT: 0 = no flip, 1 = fully flipped horizontally
  const allVerts = [];
  const xMul = 1 - 2 * flipT;
  pieces.forEach(p => {
    const pts = p.pts.map(([x,y]) => [cx + x * xMul * scale, cy + y * scale]);
    drawPoly(pts, p.col, darken(p.col), alpha);
    pts.forEach(v => allVerts.push(v));
  });
  return allVerts;
}

function drawShapeXFlipColorLerp(cx, cy, scale, pieces1, pieces2, alpha, flipT, colorT) {
  const allVerts = [];
  const xMul = 1 - 2 * flipT;
  pieces1.forEach((p, i) => {
    const pts = p.pts.map(([x,y]) => [cx + x * xMul * scale, cy + y * scale]);
    const col = lerpColor(p.col, pieces2[i].col, colorT);
    drawPoly(pts, col, darken(col), alpha);
    pts.forEach(v => allVerts.push(v));
  });
  return allVerts;
}

function lerpColor(a, b, t) {
  function parse(h) {
    if (h.length === 4) h = '#' + h[1]+h[1] + h[2]+h[2] + h[3]+h[3];
    return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  }
  const ca = parse(a), cb = parse(b);
  const r = ~~lerp(ca[0], cb[0], t);
  const g = ~~lerp(ca[1], cb[1], t);
  const bl = ~~lerp(ca[2], cb[2], t);
  return 'rgb(' + r + ',' + g + ',' + bl + ')';
}

// Desenha figura e retorna todos os vertices transformados (para desenhar pontos)
function drawFigureWithVerts(cx, cy, scale, pieces, useColor, alpha, angleDeg, reflect) {
  const allVerts = [];
  pieces.forEach(p => {
    let pts = p.pts.map(([x,y]) => {
      let nx = x, ny = y;
      if (angleDeg) [nx, ny] = rotPt(nx, ny, angleDeg);
      if (reflect) [nx, ny] = reflectY(nx, ny);
      return [cx + nx * scale, cy + ny * scale];
    });
    const fill = useColor ? p.col : p.gray;
    const stroke = useColor ? darken(p.col) : '#555';
    drawPoly(pts, fill, stroke, alpha);
    pts.forEach(v => allVerts.push(v));
  });
  return allVerts;
}

function drawFigureInterpWithVerts(cx, cy, scale, pieces, from, to, t, alpha) {
  const allVerts = [];
  pieces.forEach(p => {
    const ptsA = p.pts.map(([x,y]) => {
      let [nx,ny] = from.angle ? rotPt(x,y,from.angle) : [x,y];
      if (from.reflect) [nx,ny] = reflectY(nx,ny);
      return [cx + nx*scale, cy + ny*scale];
    });
    const ptsB = p.pts.map(([x,y]) => {
      let [nx,ny] = to.angle ? rotPt(x,y,to.angle) : [x,y];
      if (to.reflect) [nx,ny] = reflectY(nx,ny);
      return [cx + nx*scale, cy + ny*scale];
    });
    const pts = lerpPts(ptsA, ptsB, t);
    drawPoly(pts, p.col, darken(p.col), alpha);
    pts.forEach(v => allVerts.push(v));
  });
  return allVerts;
}

// ========== REGISTRO DE ANIMACOES ==========
const ANIMACOES = {};

// ===== ANIMACAO 01: Rotacao e Reflexao =====
ANIMACOES[1] = (function() {
  const PIECES = [
    { pts: [[-50,-25],[0,-75],[50,-25]], gray: '#9E9E9E', col: '#E53935' },
    { pts: [[-50,-25],[0,-25],[0,25],[-50,25]], gray: '#BDBDBD', col: '#43A047' },
    { pts: [[0,-25],[50,-25],[50,25],[0,25]], gray: '#888', col: '#1E88E5' },
    { pts: [[-50,25],[0,25],[-25,50]], gray: '#AEAEAE', col: '#FDD835' },
    { pts: [[0,25],[50,25],[65,50],[15,50]], gray: '#757575', col: '#AB47BC' }
  ];

  const T_ROT = 2000, T_PAUSE = 800, T_REF = 2000, T_HOLD = 3500, T_FADE = 600;
  const T_TOTAL = T_ROT + T_PAUSE + T_REF + T_HOLD + T_FADE;

  return function(elapsed) {
    const t = elapsed % T_TOTAL;
    const w = canvas.width, h = canvas.height;
    const s = Math.min(w / 420, h / 350) * 0.8;

    // Posicoes mais proximas
    const ox = w * 0.30, oy = h * 0.38;
    const rx = w * 0.62, ry = h * 0.32;
    const fy = h * 0.70;

    // Ponto de rotacao (entre original e rotacionado)
    const rotPointX = (ox + rx) / 2;
    const rotPointY = (oy + ry) / 2 - 10 * s;

    const t1end = T_ROT, t2end = t1end + T_PAUSE, t3end = t2end + T_REF, t4end = t3end + T_HOLD;

    // Original (cinza) com vertices
    const origVerts = drawFigureWithVerts(ox, oy, s, PIECES, false, 0.5, 0, false);
    drawVertices(origVerts, '#555', 0.6, 3);

    // Ponto de rotacao sempre visivel
    drawRotationPoint(rotPointX, rotPointY, 0.8);

    if (t < t1end) {
      // Fase 1: Animacao de rotacao
      const p = easeInOut(t / T_ROT);
      const cx = lerp(ox, rx, p), cy = lerp(oy, ry, p);
      const verts = drawFigureWithVerts(cx, cy, s, PIECES, true, 0.85 * Math.min(p*2,1), 90*p, false);
      drawVertices(verts, '#333', 0.7 * Math.min(p*2,1), 3);
    } else {
      // Rotacionado fixo
      const rotVerts = drawFigureWithVerts(rx, ry, s, PIECES, true, 0.85, 90, false);
      drawVertices(rotVerts, '#333', 0.7, 3);

      if (t >= t2end && t < t3end) {
        // Fase 3: Animacao de reflexao
        const p = easeInOut((t - t2end) / T_REF);
        const curY = lerp(ry, fy, p);
        const verts = drawFigureInterpWithVerts(rx, curY, s, PIECES, {angle:90, reflect:false}, {angle:90, reflect:true}, p, 0.75*Math.min(p*2,1));
        drawVertices(verts, '#333', 0.6 * Math.min(p*2,1), 3);
      } else if (t >= t3end) {
        // Fase 4: Tudo visivel
        const fadeA = t < t4end ? 1 : Math.max(0, 1 - (t-t4end)/T_FADE);
        const refVerts = drawFigureWithVerts(rx, fy, s, PIECES, true, 0.75*fadeA, 90, true);
        drawVertices(refVerts, '#333', 0.6*fadeA, 3);
      }
    }
  };
})();

// ===== ANIMACAO 02: Reflexao do passaro (Figura 1 -> Figura 2) =====
ANIMACOES[2] = (function() {
  // Forma do passaro (orientado para a direita)
  // Pecas: corpo, cabeca, bico, asa, cauda, olho
  const SHAPE = [
    // Corpo (elipse aproximada)
    [[-30,-5],[-20,-20],[10,-22],[28,-10],[28,12],[10,25],[-20,22],[-32,8]],
    // Cabeca
    [[18,-35],[32,-38],[42,-30],[42,-12],[30,-8],[18,-15]],
    // Bico (triangulo apontando para a direita)
    [[42,-28],[58,-22],[42,-18]],
    // Asa
    [[-12,-2],[10,2],[8,18],[-14,16]],
    // Cauda (apontando para a esquerda)
    [[-32,-2],[-52,-10],[-52,12],[-32,10]]
  ];

  const COLORS_A = ['#FF7043', '#F4511E', '#FFC107', '#D84315', '#BF360C']; // laranja/vermelho
  const COLORS_B = ['#42A5F5', '#1E88E5', '#FFD54F', '#1565C0', '#0D47A1']; // azul

  const PIECES_A = SHAPE.map((pts, i) => ({ pts: pts, col: COLORS_A[i] }));
  const PIECES_B = SHAPE.map((pts, i) => ({ pts: pts, col: COLORS_B[i] }));

  const T_SHOW1 = 1400, T_MOVE = 2200, T_HOLD = 3500, T_FADE = 600;
  const T_TOTAL = T_SHOW1 + T_MOVE + T_HOLD + T_FADE;

  return function(elapsed) {
    const t = elapsed % T_TOTAL;
    const w = canvas.width, h = canvas.height;
    const s = Math.min(w / 480, h / 320) * 0.85;

    const x1 = w * 0.30, cy = h * 0.55;
    const x2 = w * 0.70;
    const labelOffset = 60 * s;

    // Label Figura 1 sempre visivel (apos fade-in)
    const labelAlpha1 = Math.min(t / 400, 1);
    drawLabel(x1, cy - labelOffset, 'Figura 1', labelAlpha1, 16);

    // Figura 1 estatica
    const fig1Alpha = Math.min(t / 400, 1) * 0.9;
    const verts1 = drawShapeXFlip(x1, cy, s, PIECES_A, fig1Alpha, 0);
    drawVertices(verts1, '#333', 0.7 * Math.min(t/400,1), 3);

    if (t >= T_SHOW1 && t < T_SHOW1 + T_MOVE) {
      // Fase de animacao: copia do passaro se move e reflete horizontalmente
      const p = easeInOut((t - T_SHOW1) / T_MOVE);
      const cxMov = lerp(x1, x2, p);
      const fadeIn = Math.min(p * 2, 1);
      const verts = drawShapeXFlipColorLerp(cxMov, cy, s, PIECES_A, PIECES_B, 0.9 * fadeIn, p, p);
      drawVertices(verts, '#333', 0.7 * fadeIn, 3);
    } else if (t >= T_SHOW1 + T_MOVE) {
      // Figura 2 estatica com label
      const tAfter = t - T_SHOW1 - T_MOVE;
      const fadeA = tAfter < T_HOLD ? 1 : Math.max(0, 1 - (tAfter - T_HOLD) / T_FADE);
      const verts2 = drawShapeXFlip(x2, cy, s, PIECES_B, 0.9 * fadeA, 1);
      drawVertices(verts2, '#333', 0.7 * fadeA, 3);
      drawLabel(x2, cy - labelOffset, 'Figura 2', fadeA, 16);
    }
  };
})();

// ========== INICIALIZACAO ==========
const params = new URLSearchParams(window.location.search);
const animId = parseInt(params.get('anim')) || 0;

if (!ANIMACOES[animId]) {
  canvas.style.display = 'none';
  const msg = document.createElement('div');
  msg.className = 'msg-erro';
  msg.textContent = animId ? 'Animacao ' + animId + ' nao encontrada.' : 'Nenhuma animacao selecionada.';
  document.body.appendChild(msg);
} else {
  const animFn = ANIMACOES[animId];
  let startTime = null;

  function animate(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    animFn(elapsed);
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}
</script>
</body>
</html>
