<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualização - Rotação e Reflexão</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth || 500;
  canvas.height = window.innerHeight || 400;
}
resize();
window.addEventListener('resize', resize);

// Tangram-like figure: 5 colored pieces forming a house shape
// Points in local coords (centered ~0,0), size ~100x125
const PIECES = [
  { pts: [[-50,-25],[0,-75],[50,-25]], gray: '#9E9E9E', col: '#E53935' },
  { pts: [[-50,-25],[0,-25],[0,25],[-50,25]], gray: '#BDBDBD', col: '#43A047' },
  { pts: [[0,-25],[50,-25],[50,25],[0,25]], gray: '#888', col: '#1E88E5' },
  { pts: [[-50,25],[0,25],[-25,50]], gray: '#AEAEAE', col: '#FDD835' },
  { pts: [[0,25],[50,25],[65,50],[15,50]], gray: '#757575', col: '#AB47BC' }
];

function rotPt(x, y, ang) {
  const r = ang * Math.PI / 180;
  return [x*Math.cos(r) - y*Math.sin(r), x*Math.sin(r) + y*Math.cos(r)];
}

function reflectY(x, y) { return [x, -y]; }

function lerp(a, b, t) { return a + (b - a) * t; }

function lerpPts(a, b, t) { return a.map((p,i) => [lerp(p[0],b[i][0],t), lerp(p[1],b[i][1],t)]); }

function darken(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${~~(r*0.65)},${~~(g*0.65)},${~~(b*0.65)})`;
}

function drawPoly(pts, fill, stroke, alpha) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawFigure(cx, cy, scale, pieces, useColor, alpha, angleDeg, reflect) {
  pieces.forEach(p => {
    let pts = p.pts.map(([x,y]) => {
      let nx = x, ny = y;
      if (angleDeg) [nx, ny] = rotPt(nx, ny, angleDeg);
      if (reflect) [nx, ny] = reflectY(nx, ny);
      return [cx + nx * scale, cy + ny * scale];
    });
    const fill = useColor ? p.col : p.gray;
    const stroke = useColor ? darken(p.col) : '#555';
    drawPoly(pts, fill, stroke, alpha);
  });
}

function drawFigureInterp(cx, cy, scale, pieces, from, to, t, alpha) {
  // from/to: {angle, reflect}
  pieces.forEach(p => {
    const ptsA = p.pts.map(([x,y]) => {
      let [nx,ny] = from.angle ? rotPt(x,y,from.angle) : [x,y];
      if (from.reflect) [nx,ny] = reflectY(nx,ny);
      return [cx + nx*scale, cy + ny*scale];
    });
    const ptsB = p.pts.map(([x,y]) => {
      let [nx,ny] = to.angle ? rotPt(x,y,to.angle) : [x,y];
      if (to.reflect) [nx,ny] = reflectY(nx,ny);
      return [cx + nx*scale, cy + ny*scale];
    });
    const pts = lerpPts(ptsA, ptsB, t);
    drawPoly(pts, p.col, darken(p.col), alpha);
  });
}

function drawLabel(text, x, y, color, alpha, size) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = `bold ${size||13}px Nunito, Arial, sans-serif`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawCurvedArrow(x1, y1, cx1, cy1, x2, y2, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.setLineDash([6,4]);
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.quadraticCurveTo(cx1,cy1,x2,y2);
  ctx.stroke();
  ctx.setLineDash([]);
  const t=0.95, ax=2*(1-t)*(cx1-x1)+2*t*(x2-cx1), ay=2*(1-t)*(cy1-y1)+2*t*(y2-cy1);
  const a = Math.atan2(ay,ax);
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x2,y2); ctx.lineTo(x2-10*Math.cos(a-0.4),y2-10*Math.sin(a-0.4));
  ctx.moveTo(x2,y2); ctx.lineTo(x2-10*Math.cos(a+0.4),y2-10*Math.sin(a+0.4));
  ctx.stroke();
  ctx.restore();
}

function drawDashed(x1,y1,x2,y2,color,alpha) {
  ctx.save();
  ctx.globalAlpha=alpha; ctx.strokeStyle=color; ctx.lineWidth=2;
  ctx.setLineDash([8,5]);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawGridDots() {
  const step = 20;
  ctx.fillStyle = '#ddd';
  for (let x = step; x < canvas.width; x += step)
    for (let y = step; y < canvas.height; y += step) {
      ctx.beginPath(); ctx.arc(x,y,0.8,0,Math.PI*2); ctx.fill();
    }
}

function easeInOut(t) { return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }

// Animation timing
const T_ROT = 2000, T_PAUSE = 800, T_REF = 2000, T_HOLD = 3500, T_FADE = 600;
const T_TOTAL = T_ROT + T_PAUSE + T_REF + T_HOLD + T_FADE;

let startTime = null;

function animate(ts) {
  if (!startTime) startTime = ts;
  const elapsed = (ts - startTime) % T_TOTAL;
  const w = canvas.width, h = canvas.height;

  ctx.clearRect(0, 0, w, h);
  drawGridDots();

  // Scale figure to fit
  const s = Math.min(w / 520, h / 400) * 0.85;
  const figScale = s;

  // 3 positions
  const ox = w * 0.22, oy = h * 0.35;   // original
  const rx = w * 0.70, ry = h * 0.30;   // rotated
  const fy = h * 0.78;                   // reflected (same x as rotated)

  // --- Always draw original (gray) ---
  drawFigure(ox, oy, figScale, PIECES, false, 0.5, 0, false);
  drawLabel('Original', ox, oy - 80*figScale, '#777', 0.7, 13*Math.max(figScale,0.7));

  const t1end = T_ROT;
  const t2end = t1end + T_PAUSE;
  const t3end = t2end + T_REF;
  const t4end = t3end + T_HOLD;

  // --- Phase 1: Rotation animation ---
  if (elapsed < t1end) {
    const p = easeInOut(elapsed / T_ROT);
    const cx = lerp(ox, rx, p), cy = lerp(oy, ry, p);
    drawFigure(cx, cy, figScale, PIECES, true, 0.85 * Math.min(p*2,1), 90*p, false);

    // Arrow
    const arrowA = Math.min(elapsed / (T_ROT*0.5), 1);
    const ax1 = ox+35*figScale, ay1 = oy-70*figScale;
    const ax2 = rx-35*figScale, ay2 = ry-70*figScale;
    const acx = (ax1+ax2)/2, acy = Math.min(ay1,ay2)-35*figScale;
    drawCurvedArrow(ax1,ay1,acx,acy,ax2,ay2,'#E53935',arrowA*0.7);
    drawLabel('Rotação 90°', acx, acy-10*figScale, '#E53935', arrowA*0.8, 14*Math.max(figScale,0.7));
  }
  // --- Phase 2+: Rotated stays ---
  else {
    drawFigure(rx, ry, figScale, PIECES, true, 0.85, 90, false);
    const ax1 = ox+35*figScale, ay1 = oy-70*figScale;
    const ax2 = rx-35*figScale, ay2 = ry-70*figScale;
    const acx = (ax1+ax2)/2, acy = Math.min(ay1,ay2)-35*figScale;
    drawCurvedArrow(ax1,ay1,acx,acy,ax2,ay2,'#E53935',0.4);
    drawLabel('Rotação 90°', acx, acy-10*figScale, '#E53935', 0.5, 14*Math.max(figScale,0.7));

    // --- Phase 3: Reflection animation ---
    if (elapsed >= t2end && elapsed < t3end) {
      const p = easeInOut((elapsed - t2end) / T_REF);

      // Reflection axis
      const axY = (ry + fy) / 2;
      drawDashed(w*0.35, axY, w*0.92, axY, '#9C27B0', p*0.5);
      drawLabel('Eixo de reflexão', w*0.53, axY-10, '#9C27B0', p*0.5, 11*Math.max(figScale,0.7));

      // Interpolate: rotated piece flips to reflected position
      const curY = lerp(ry, fy, p);
      // Interpolate angle: from {angle:90, no reflect} to {angle:90, reflected}
      drawFigureInterp(rx, curY, figScale, PIECES, {angle:90, reflect:false}, {angle:90, reflect:true}, p, 0.75*Math.min(p*2,1));
    }
    // --- Phase 4: Hold all ---
    else if (elapsed >= t3end) {
      const fadeA = elapsed < t4end ? 1 : Math.max(0, 1 - (elapsed-t4end)/T_FADE);
      const axY = (ry + fy) / 2;
      drawDashed(w*0.35, axY, w*0.92, axY, '#9C27B0', 0.4*fadeA);
      drawLabel('Eixo de reflexão', w*0.53, axY-10, '#9C27B0', 0.4*fadeA, 11*Math.max(figScale,0.7));

      drawFigure(rx, fy, figScale, PIECES, true, 0.75*fadeA, 90, true);

      const pulse = 0.5 + 0.2*Math.sin((elapsed-t3end)/400);
      drawLabel('Reflexão', rx, fy+80*figScale, '#9C27B0', pulse*fadeA, 14*Math.max(figScale,0.7));
    }
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
